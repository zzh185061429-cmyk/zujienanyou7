<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>悬浮球输入框</title>
  <style>
    /* ========== 悬浮球 ========== */
    #float-ball {
      position: fixed;
      bottom: 80px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a855f7, #6366f1);
      cursor: grab;
      z-index: 2147483647;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.5);
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
    }
    #float-ball:active { cursor: grabbing; transform: scale(1.1); }
    #float-ball:hover { transform: scale(1.05); }
    #float-ball svg {
      width: 28px; height: 28px;
      fill: white; pointer-events: none;
    }

    /* ========== 输入面板 ========== */
    #float-input-panel {
      position: fixed;
      bottom: 160px;
      right: 30px;
      width: 360px;
      max-height: 300px;
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 12px;
      padding: 16px;
      z-index: 2147483646;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      display: none;
      flex-direction: column;
      gap: 10px;
      color: #cdd6f4;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
    }
    #float-input-panel textarea {
      width: 100%; height: 120px;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 8px;
      padding: 10px;
      resize: vertical;
      font-family: inherit;
      font-size: inherit;
      outline: none;
      box-sizing: border-box;
    }
    #float-input-panel textarea:focus {
      border-color: #a855f7;
    }
    #float-input-panel .btn-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    #float-input-panel button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    #float-input-panel .btn-send {
      background: linear-gradient(135deg, #a855f7, #6366f1);
      color: white;
    }
    #float-input-panel .btn-send:hover { opacity: 0.85; }
    #float-input-panel .btn-close {
      background: #45475a;
      color: #cdd6f4;
    }
    #float-input-panel .btn-close:hover { background: #585b70; }

    /* ========== 状态提示 ========== */
    #float-status {
      position: fixed;
      bottom: 20px;
      right: 30px;
      background: #313244;
      color: #a6e3a1;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 2147483646;
      display: none;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body style="height:2000px; background:#11111b;">

  <!-- 悬浮球 -->
  <div id="float-ball">
    <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9v8h18v-8c0-4.97-4.03-9-9-9zm-3 11H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/></svg>
  </div>

  <!-- 输入面板 -->
  <div id="float-input-panel">
    <textarea id="float-textarea" placeholder="输入消息... (Enter 发送, Esc 关闭)"></textarea>
    <div class="btn-row">
      <button class="btn-close" id="float-close-btn">关闭</button>
      <button class="btn-send" id="float-send-btn">发送</button>
    </div>
  </div>

  <!-- 状态提示 -->
  <div id="float-status"></div>

  <script>
    (function() {
      // ====== DOM 引用 ======
      var ball      = document.getElementById('float-ball');
      var panel     = document.getElementById('float-input-panel');
      var textarea  = document.getElementById('float-textarea');
      var sendBtn   = document.getElementById('float-send-btn');
      var closeBtn  = document.getElementById('float-close-btn');
      var statusEl  = document.getElementById('float-status');

      // ====== 拖拽 ======
      var dragging = false;
      var startX, startY, startRight, startBottom;
      var hasMoved = false;

      ball.addEventListener('mousedown', function(e) {
        if (e.button !== 0) return;
        dragging = true;
        hasMoved = false;
        startX = e.clientX;
        startY = e.clientY;
        startRight = parseInt(getComputedStyle(ball).right) || 30;
        startBottom = parseInt(getComputedStyle(ball).bottom) || 80;
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        var dx = startX - e.clientX;
        var dy = startY - e.clientY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved = true;
        ball.style.right = (startRight + dx) + 'px';
        ball.style.bottom = (startBottom - dy) + 'px';
        // 面板跟随
        panel.style.right = ball.style.right;
        panel.style.bottom = (parseInt(ball.style.bottom) + 80) + 'px';
      });

      document.addEventListener('mouseup', function() {
        if (dragging && !hasMoved) {
          // 是点击，不是拖拽 → 切换面板
          togglePanel();
        }
        dragging = false;
      });

      // ====== 触摸拖拽（手机） ======
      ball.addEventListener('touchstart', function(e) {
        dragging = true;
        hasMoved = false;
        var t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
        startRight = parseInt(getComputedStyle(ball).right) || 30;
        startBottom = parseInt(getComputedStyle(ball).bottom) || 80;
      }, { passive: false });

      document.addEventListener('touchmove', function(e) {
        if (!dragging) return;
        var t = e.touches[0];
        var dx = startX - t.clientX;
        var dy = startY - t.clientY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) hasMoved = true;
        ball.style.right = (startRight + dx) + 'px';
        ball.style.bottom = (startBottom - dy) + 'px';
        panel.style.right = ball.style.right;
        panel.style.bottom = (parseInt(ball.style.bottom) + 80) + 'px';
      }, { passive: false });

      document.addEventListener('touchend', function() {
        if (dragging && !hasMoved) togglePanel();
        dragging = false;
      });

      // ====== 面板开关 ======
      function togglePanel() {
        if (panel.style.display === 'flex') {
          closePanel();
        } else {
          openPanel();
        }
      }

      function openPanel() {
        panel.style.display = 'flex';
        textarea.focus();
      }

      function closePanel() {
        panel.style.display = 'none';
        textarea.value = '';
      }

      // ====== 发送消息 ======
      function sendMessage() {
        var msg = textarea.value.trim();
        if (!msg) return;

        // 尝试发送到酒馆（在酒馆环境下）
        var sent = false;

        // 方法1: 用酒馆助手的 triggerSlash
        if (typeof triggerSlash !== 'undefined') {
          triggerSlash('/send ' + msg);
          sent = true;
        }

        // 方法2: 直接操作酒馆的发送按钮
        if (!sent && typeof SillyTavern !== 'undefined') {
          var $sendArea = document.querySelector('#send_textarea');
          if ($sendArea) {
            // 模拟输入
            var nativeInputValueSetter = Object.getOwnPropertyDescriptor(
              window.HTMLTextAreaElement.prototype, 'value'
            ).set;
            nativeInputValueSetter.call($sendArea, msg);
            $sendArea.dispatchEvent(new Event('input', { bubbles: true }));
            // 点击发送
            var $sendBtn = document.querySelector('#send_but');
            if ($sendBtn) { $sendBtn.click(); sent = true; }
          }
        }

        if (sent) {
          showStatus('已发送', '#a6e3a1');
          textarea.value = '';
        } else {
          showStatus('未检测到酒馆环境，消息: ' + msg, '#fab387');
        }
      }

      function showStatus(text, color) {
        statusEl.textContent = text;
        statusEl.style.color = color;
        statusEl.style.display = 'block';
        setTimeout(function() {
          statusEl.style.display = 'none';
        }, 2000);
      }

      // ====== 事件绑定 ======
      sendBtn.addEventListener('click', sendMessage);
      closeBtn.addEventListener('click', closePanel);

      textarea.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
        if (e.key === 'Escape') {
          closePanel();
        }
      });

      // ====== 点击面板外部关闭 ======
      document.addEventListener('mousedown', function(e) {
        if (panel.style.display !== 'flex') return;
        if (!panel.contains(e.target) && e.target !== ball) {
          closePanel();
        }
      });

      console.log('悬浮球输入框已就绪 — 纯 JavaScript，无需构建');
    })();
  </script>
</body>
</html>
