,'其实，父母每周都会要求报备出行和位置，防止再度突发奇想离家出走。','其实每次新剧组开拍前都会去姜朝渔家里一趟，据说是为了“撸大猫”放松心情。','其实会在一个人在家的时候，抱着那只叫“姜董”的猫对戏。'],sisterNote:'今歌姐可是自家人，不过她出价也是顶级的，千万别因为熟就懈怠了！'},{id:'4',name:'周念安',role:'法学院学霸 / 前女友',price:'¥2,000/天',color:'bg-pop-yellow',avatar:'https://i.postimg.cc/bN8z1wX5/1000213237.png',desc:'燕大法学院大三学生，你的前女友。外表冷漠，因为自卑曾主动提分手，实则拼命攒钱只为包养你。',tags:['前女友','学霸','自卑又自尊'],likes:'物美价廉的小玩意儿、自己做菜、下雨天',dislikes:'游乐园的卡通发箍、欠条、别人请客',secret:['其实吃不了一点辣，但是不会告诉任何人。','打工地点是城东的“回头草咖啡”，对老板娘的起名水平和回头草这个词带有微妙的怨念。','其实有阅读癖，连洗发水包装上的配方表也会偷偷记下来。','其实只有在涉及法律专业知识的时候才会引用那些条文，对搭讪者会甩看垃圾的眼神。','其实每次的工资都会打给妈妈大头并虚报金额，不想让妈妈知道自己很累。','其实有一个单独的账户每周存钱，用来攒“包养”你的嫁妆。','其实酒量不行，喝醉后会晕乎乎地撒娇要抱抱，但除了你没人见过。'],sisterNote:'她居然也来下单了...虽然以前是嫂子，但现在是客户，公私分明懂不懂？'},{id:'5',name:'季明舒',role:'地产千金 / 霸总脑',price:'¥500,000/天',color:'bg-pop-black',textColor:'text-white',avatar:'https://i.postimg.cc/kgpwtzwq/nai-3587295711.png',desc:'季氏地产的掌上明珠，深受霸总文学毒害，喜欢对你使用土味情话和霸总语录。',tags:['自信直率','霸总脑','浪漫主义'],likes:'给自己配旁白、言情小说、被人注视',dislikes:'文艺片、掉头发、恐怖片',secret:['其实对你用的每一句台词都是前一晚熬夜到两三点钟才想好的，为此掉了很多头发。','其实连载的小说有被人批评过不切实际，她的回复是“虚构作品甜一点也没什么不好”。','其实除了那些言情小说，她的房间布置很乱，每天都需要保姆重新整理。','因为狗毛过敏养了一只会模仿她说话的鹦鹉，起名“季明舒的鹦武者”。','其实每周六都会风雨无阻地去福利院做一整天的公益志愿者。'],sisterNote:'这位大小姐脑回路有点特别，你只要配合她演好‘娇妻’...啊不，男主角就行了！'},{id:'6',name:'傅霁',role:'R18画师 / 白化病少女',price:'¥8,000/天',color:'bg-white',textColor:'text-pop-black',avatar:'https://i.postimg.cc/zfRm9sZ7/1000213236.png',desc:'患有白化病的数媒大一学生，知名R18画师“白兔先生”。为了突破创作瓶颈而雇佣你作为模特。',tags:['三无','画师','白发红瞳'],likes:'被人说好话、毛毯、颜文字',dislikes:'人多的场合、拽专业名词的人、阳光直射',secret:['其实有一个用来取材的小圈子，里边全部都是各种哭唧唧的宅女画师。','因为个子不高，对于公共洗手间的镜子有怨念，因此作品里从不出现洗浴间剧情。','其实作品里的女角色都是胸大腿长，被外界误认为是一个高挑的冷艳御姐。','其实家里有很多不同品牌的木瓜牛奶。'],sisterNote:'去她家当模特？老哥你可悠着点，别被画进什么奇怪的本子里了。'},{id:'7',name:'椎名律',role:'小提琴天才',price:'¥3,000/天',color:'bg-pop-pink',avatar:'https://i.postimg.cc/0Np69H75/nai-4055558051.png',desc:'日本小提琴天才，性格张扬叛逆，喜欢恶作剧。因为觉得有趣而下载了APP看你的笑话。',tags:['天才','叛逆','恶作剧'],likes:'恶作剧、麻辣烫、夜晚便利店',dislikes:'正经场合、被说可惜、密码日记本',secret:['其实手机壁纸是被禁赛那天评委们的脸，看到他们不爽的脸就想笑。','其实只有左耳打了耳洞，因为怕疼宣布绝对不
